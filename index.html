<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アルティメット・モミール・ジェネレーター</title>
    <style>
        :root {
            /* デフォルトテーマ */
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --subtext-color: #666666;
            --border-color: #e9ecef;
            --light-bg: #f8f9fa;
            --btn-overlay: 0, 123, 255;
            --shadow-color: rgba(0,0,0,0.1);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0; 
            box-sizing: border-box;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .app-wrapper {
            display: flex; flex-direction: column; align-items: center;
            max-width: 1200px; margin: 0 auto; padding: 20px; gap: 20px;
        }

        /* --- ヘッダー・設定 --- */
        .settings-container {
            width: 100%; background-color: var(--card-bg); padding: 20px;
            border-radius: 12px; box-shadow: 0 4px 10px var(--shadow-color);
            border: 1px solid var(--border-color); box-sizing: border-box;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }
        .theme-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        h1 { margin: 0; color: var(--text-color); font-size: 1.5rem;}
        .theme-selector-container { display: flex; align-items: center; gap: 10px; }
        .theme-selector-container label { font-weight: bold; color: var(--text-color); }
        #guild-icons { display: flex; gap: 5px; align-items: center; height: 24px;}
        #guild-icons img { width: 20px; height: 20px; filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.2)); }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .settings-grid { grid-template-columns: 1fr; } }

        .options-section-title { font-weight: bold; color: var(--text-color); border-bottom: 2px solid var(--primary-color); margin-bottom: 10px; padding-bottom: 5px;}
        .color-header, .rarity-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem;}
        .color-options, .rarity-options { background-color: var(--light-bg); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); transition: background-color 0.4s ease; margin-bottom: 10px; }
        .checkboxes { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .checkboxes label { display: flex; align-items: center; cursor: pointer; color: var(--text-color); font-weight: 500; font-size: 0.9rem;}
        .checkboxes input { margin-right: 3px; }

        .common-controls { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }

        input[type="number"], select {
            padding: 8px; font-size: 14px; border: 2px solid var(--border-color);
            border-radius: 5px; text-align: center; background: var(--card-bg); color: var(--text-color); font-weight: bold;
        }
        select { cursor: pointer; }
        button {
            padding: 8px 15px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-color); cursor: pointer; border-radius: 5px; font-weight: bold;
            transition: all 0.2s ease;
        }
        button:hover { border-color: var(--primary-color); color: var(--primary-color);}
        
        #open-settings-btn { width: 100%; background: var(--primary-color); color: white; border: none;}
        #open-settings-btn:hover { filter: brightness(1.1); color: white;}

        /* --- タブ切り替え --- */
        .tab-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; width: 100%; }
        .tab-btn { padding: 12px 30px; font-size: 1.1rem; background: var(--light-bg); border: 2px solid var(--border-color); }
        .tab-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }

        /* --- 生成エリア (シンプル) --- */
        .simple-generator {
            width: 100%; text-align: center; background: var(--card-bg); padding: 30px;
            border-radius: 12px; box-shadow: 0 4px 10px var(--shadow-color); border: 1px solid var(--border-color); box-sizing: border-box;
            transition: background-color 0.4s ease;
        }
        .gen-btn {
            padding: 12px 30px; font-size: 1.2rem; margin-top: 20px;
            background: linear-gradient(rgba(var(--btn-overlay), 0.85), rgba(var(--btn-overlay), 0.85)), url('https://cards.scryfall.io/art_crop/front/8/8/88f342ec-a09c-4ec8-bca4-dccf7d0ea622.jpg');
            background-size: cover; background-position: center; color: white; border: none; border-radius: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); cursor: pointer;
        }
        .gen-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 15px var(--shadow-color); filter: brightness(1.1); color: white;}
        .gen-btn:disabled { background: #ccc; cursor: not-allowed; filter: grayscale(1); transform: none; box-shadow: none;}

        #result { margin-top: 20px; min-height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        
        @keyframes spin-in {
            0% { transform: scale(0) rotateY(-180deg); opacity: 0; }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }
        #card-image { 
            max-width: 90%; max-height: 500px; border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .spin-animate { animation: spin-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        #pick-container {
            display: none; gap: 20px; justify-content: center; flex-wrap: wrap; width: 100%; margin-top: 20px;
        }
        .pick-image {
            width: 200px; border-radius: 12px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.2s, box-shadow 0.2s; border: 4px solid transparent;
            animation: spin-in 0.4s ease-out backwards;
        }
        .pick-image:nth-child(1) { animation-delay: 0s; }
        .pick-image:nth-child(2) { animation-delay: 0.1s; }
        .pick-image:nth-child(3) { animation-delay: 0.2s; }
        .pick-image:hover { transform: translateY(-10px); box-shadow: 0 12px 20px rgba(var(--btn-overlay), 0.4); border-color: var(--primary-color); }

        /* --- バトルシミュレーター --- */
        .battle-board {
            display: grid; grid-template-rows: auto 1fr 1fr auto; gap: 15px;
            background: var(--bg-color); border: 2px solid var(--border-color);
            border-radius: 10px; padding: 15px; box-sizing: border-box; min-height: 80vh;
            transition: background-color 0.4s ease;
        }
        .board-header { display: flex; justify-content: space-between; align-items: center; background: var(--light-bg); padding: 10px; border-radius: 8px;}
        .stats-area { font-size: 1.2rem; font-weight: bold; display: flex; gap: 15px; align-items: center;}
        
        /* ゾーンのデザイン */
        .zone {
            border: 2px dashed var(--border-color); border-radius: 8px; 
            padding: 10px; padding-top: 40px; 
            background: var(--card-bg); display: flex; flex-wrap: wrap; gap: 10px;
            align-content: flex-start; position: relative; min-height: 140px;
            transition: background-color 0.4s ease;
        }
        .zone-label { 
            position: absolute; top: 0; left: 0; 
            background: var(--light-bg); 
            padding: 5px 12px; 
            font-size: 0.85rem; font-weight: bold; color: var(--text-color); 
            border-bottom: 1px solid var(--border-color); 
            border-right: 1px solid var(--border-color);
            border-bottom-right-radius: 8px; 
            pointer-events: none;
        }
        
        /* ゲーム内カード (共通) */
        .game-card {
            width: 90px; height: 126px; border-radius: 6px;
            background-color: #333; background-size: cover; background-position: center;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.1s;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }
        .game-card:hover { transform: scale(1.1); z-index: 10; }
        .game-card.tapped { transform: rotate(90deg); opacity: 0.7; margin: 0 10px; }
        .game-card.selected { border: 3px solid #ff3333; box-shadow: 0 0 15px #ff3333; transform: translateY(-10px); }
        
        /* 土地用のスタイル（画像なし・グレー） */
        .game-card.land-card {
            background-color: #b0b0b0; 
            background-image: none !important;
            border: 2px solid #888;
        }
        .mana-icon {
            width: 60%; opacity: 0.9; pointer-events: none;
        }

        .momir-control-panel {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            padding: 15px; background: var(--light-bg); border-radius: 8px; border: 1px solid var(--border-color);
        }

        /* --- 履歴 --- */
        .history-section {
            width: 100%; background: var(--card-bg); padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 10px var(--shadow-color); border: 1px solid var(--border-color); box-sizing: border-box;
            transition: background-color 0.4s ease;
        }
        .history-list { display: flex; flex-wrap: wrap; gap: 10px; max-height: 200px; overflow-y: auto; }
        .history-item {
            width: 60px; height: 84px; background-size: cover; border-radius: 4px; cursor: zoom-in;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: relative;
        }
        .history-item:hover { transform: scale(1.1); z-index: 5; }

        /* --- プレビュー --- */
        #preview-overlay {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 4000; pointer-events: none; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8));
        }
        #preview-overlay img { max-height: 85vh; max-width: 90vw; border-radius: 15px; }

        /* --- Pick Overlay (シミュレーター3pick用) --- */
        #pick-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 3000;
            flex-direction: column; justify-content: center; align-items: center;
        }
        #pick-content { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 90%; }
        #pick-message { color: white; font-size: 1.5rem; margin-bottom: 20px; font-weight: bold; }

        /* --- Modal --- */
        dialog { 
            width: 90%; max-width: 800px; border-radius: 10px; border: 2px solid var(--primary-color); 
            background: var(--card-bg); color: var(--text-color); padding: 0;
        }
        dialog::backdrop { background-color: rgba(0,0,0,0.7); }
        .modal-header { padding: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: var(--light-bg);}
        .modal-body { padding: 20px; max-height: 60vh; overflow-y: auto; }
        .modal-footer { padding: 15px; border-top: 1px solid var(--border-color); text-align: right; background: var(--light-bg);}
        
        .format-buttons button.active { background-color: var(--primary-color); color: white; border-color: var(--primary-hover); }
        .expansion-symbol { cursor: pointer; filter: grayscale(1) opacity(0.3); display: inline-flex; width: 40px; height: 40px; justify-content: center; align-items: center;}
        .expansion-symbol.selected { filter: none; opacity: 1; }
        .expansion-symbol img { max-width: 100%; max-height: 100%; }
        #expansion-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 10px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <!-- 全体設定エリア -->
        <div class="settings-container">
            <div class="theme-header">
                <h1>モミール・ジェネレーター</h1>
                <div class="theme-selector-container">
                    <label>テーマ:</label>
                    <div id="guild-icons"></div>
                    <select id="theme-select">
                        <option value="classic">クラシック (デフォルト)</option>
                        <optgroup label="ラヴニカのギルド (2色)">
                            <option value="azorius">アゾリウス (白/青)</option>
                            <option value="orzhov">オルゾフ (白/黒)</option>
                            <option value="boros">ボロス (赤/白)</option>
                            <option value="selesnya">セレズニア (緑/白)</option>
                            <option value="dimir">ディミーア (青/黒)</option>
                            <option value="izzet">イゼット (青/赤)</option>
                            <option value="rakdos">ラクドス (黒/赤)</option>
                            <option value="golgari">ゴルガリ (黒/緑)</option>
                            <option value="gruul">グルール (赤/緑)</option>
                            <option value="simic">シミック (緑/青)</option>
                        </optgroup>
                        <optgroup label="アラーラの断片 (3色)">
                            <option value="bant">バント (緑/白/青)</option>
                            <option value="esper">エスパー (白/青/黒)</option>
                            <option value="grixis">グリクシス (青/黒/赤)</option>
                            <option value="jund">ジャンド (黒/赤/緑)</option>
                            <option value="naya">ナヤ (赤/緑/白)</option>
                        </optgroup>
                        <optgroup label="タルキールの氏族 (3色)">
                            <option value="abzan">アブザン (白/黒/緑)</option>
                            <option value="jeskai">ジェスカイ (青/赤/白)</option>
                            <option value="sultai">スゥルタイ (黒/緑/青)</option>
                            <option value="mardu">マルドゥ (赤/白/黒)</option>
                            <option value="temur">ティムール (緑/青/赤)</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="settings-grid">
                <!-- 左側：範囲設定 -->
                <div>
                    <div class="options-section-title">エキスパンション・フォーマット</div>
                    <button id="open-settings-btn" disabled>エキスパンション設定を開く (読み込み中...)</button>
                    <div id="current-scope" style="margin-top:5px; font-style:italic; font-size:0.9rem;">現在: 全セット（レガシー）</div>
                </div>

                <!-- 右側：色・レアリティ -->
                <div>
                    <div class="color-header">
                        <span>色の絞り込み</span>
                        <select id="color-logic-select">
                            <option value="or">を含む (OR)</option>
                            <option value="subset">の範囲内 (Only)</option>
                        </select>
                    </div>
                    <div class="color-options">
                        <div class="checkboxes">
                            <label><input type="checkbox" name="color" value="w"> 白</label>
                            <label><input type="checkbox" name="color" value="u"> 青</label>
                            <label><input type="checkbox" name="color" value="b"> 黒</label>
                            <label><input type="checkbox" name="color" value="r"> 赤</label>
                            <label><input type="checkbox" name="color" value="g"> 緑</label>
                            <label><input type="checkbox" name="color" value="c"> 無色</label>
                        </div>
                    </div>

                    <div class="rarity-header"><span>レアリティ (初版準拠)</span></div>
                    <div class="rarity-options">
                        <div class="checkboxes">
                            <label><input type="checkbox" name="rarity" value="c"> C</label>
                            <label><input type="checkbox" name="rarity" value="u"> U</label>
                            <label><input type="checkbox" name="rarity" value="r"> R</label>
                            <label><input type="checkbox" name="rarity" value="m"> M</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="common-controls">
                <div>
                    <label style="font-weight:bold">モード:</label>
                    <select id="mode-select">
                        <option value="normal">ノーマル</option>
                        <option value="3pick">3pick (選択)</option>
                        <option value="cube">キューブ (重複なし)</option>
                        <!-- アルティメットは初期状態では非表示 -->
                    </select>
                </div>
                <div>
                    <label style="font-weight:bold">言語:</label>
                    <select id="lang-select">
                        <option value="en">英語</option>
                        <option value="ja">日本語</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('simple')">シンプル生成</button>
            <button class="tab-btn" onclick="switchTab('battle')">対戦モード (シミュレーター)</button>
        </div>

        <!-- タブ1: シンプル生成 -->
        <div id="tab-simple" class="tab-content active">
            <div class="simple-generator">
                <div>
                    <label style="font-weight:bold; font-size:1.2rem;">マナ・コスト(X): </label>
                    <input type="number" id="mana-cost" value="1" min="0" max="16" style="padding:10px; font-size:1.2rem; width:80px;">
                </div>
                <button id="generate-button" class="gen-btn" disabled>クリーチャー生成</button>
                
                <div id="result">
                    <div id="loading-spinner" style="display:none; color:var(--primary-color); font-weight:bold; font-size:1.5rem;">召喚中...</div>
                    <div id="message" style="margin-top:20px; font-weight:bold; color:var(--text-color);">ボタンを押してスタート</div>
                    
                    <!-- 結果表示用（メイン） -->
                    <img id="card-image" src="" alt="" style="display: none;">
                    
                    <!-- 3pick用（インライン） -->
                    <div id="pick-container"></div>
                </div>
            </div>
        </div>

        <!-- タブ2: バトルシミュレーター -->
        <div id="tab-battle" class="tab-content">
            <div class="battle-board">
                <div class="board-header">
                    <div class="stats-area">
                        <span>Life: <span id="game-life">20</span></span>
                        <button onclick="modifyLife(1)">+</button>
                        <button onclick="modifyLife(-1)">-</button>
                        <span style="margin-left:20px">Lib: <span id="game-library-count">60</span></span>
                        <span style="margin-left:20px">Grave: <span id="game-grave-count">0</span></span>
                    </div>
                    <div>
                        <button onclick="gameUntap()">アンタップ</button>
                        <button onclick="gameDraw()">ドロー</button>
                        <button onclick="gameNewGame()" style="background:#d9534f; color:white; border-color:#d43f3a; margin-left:20px;">Reset</button>
                    </div>
                </div>

                <div class="zone" id="zone-battlefield-creatures">
                    <span class="zone-label" id="battlefield-title">戦場 (クリーチャー)</span>
                </div>

                <div class="zone" id="zone-battlefield-lands">
                    <span class="zone-label">戦場 (土地)</span>
                </div>

                <div class="momir-control-panel">
                    <label style="font-weight:bold; font-size:1.1rem;">モミール能力: (X), 手札1枚捨て</label>
                    <input type="number" id="game-momir-x" value="1" min="0" max="16" style="width:60px; padding:5px; font-size:1.1rem;">
                    <button class="gen-btn" id="game-momir-btn" style="padding:5px 20px; margin-top:0;">起動</button>
                    <div id="game-message" style="color:red; font-weight:bold;"></div>
                </div>

                <div class="zone hand-zone" id="zone-hand">
                    <span class="zone-label">手札 (クリックで土地プレイ / モミールコスト選択)</span>
                </div>
            </div>
            <p style="text-align:center; color:var(--subtext-color);">※一人用シミュレーターです。対戦相手と画面を共有して遊んでください。</p>
        </div>

        <!-- 履歴エリア -->
        <div class="history-section">
            <h3 style="margin-top:0; border-bottom:2px solid var(--primary-color); padding-bottom:10px; color:var(--text-color);">生成履歴</h3>
            <div id="history-mode-info" style="margin-bottom:10px; font-size:0.9rem; color:var(--subtext-color);">※ノーマルモード</div>
            <div class="history-list" id="history-list"></div>
        </div>

    </div>

    <!-- オーバーレイ -->
    <div id="preview-overlay"><img id="preview-image" src=""></div>
    
    <!-- 3pick Overlay (for Battle Mode) -->
    <div id="pick-overlay">
        <div id="pick-message">1枚選択してください</div>
        <div id="pick-content"></div>
    </div>

    <!-- エキスパンション設定モーダル -->
    <dialog id="expansion-dialog">
        <div class="modal-header">
            <h2>エキスパンション設定</h2>
            <button class="close-btn" title="閉じる">&times;</button>
        </div>
        <div class="modal-body">
            <div class="format-buttons">
                <button data-format="standard">スタンダード</button>
                <button data-format="pioneer">パイオニア</button>
                <button data-format="modern">モダン</button>
                <button data-format="legacy" class="active">レガシー</button>
            </div>
            <hr style="border:0; border-top:1px solid var(--border-color); margin:15px 0;">
            <div class="expansion-controls">
                <span>個別選択</span>
                <button id="clear-sets-btn">すべてオフ</button>
            </div>
            <div id="expansion-list"><div id="set-loader">Loading...</div></div>
        </div>
        <div class="modal-footer">
            <button id="apply-settings-btn" style="background:var(--primary-color); color:white; border:none; padding:10px 20px;">設定を適用</button>
        </div>
    </dialog>

    <script>
        // --- グローバル関数: Tab Logic ---
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
            const target = document.getElementById('tab-' + id);
            if (target) target.classList.add('active');
            
            const btns = document.querySelectorAll('.tab-btn');
            if(id === 'simple') btns[0].classList.add('active'); 
            else if(btns[1]) btns[1].classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', () => {
            // --- Theme Definitions ---
            const guildThemes = {
                classic: { '--primary-color': '#007bff', '--primary-hover': '#0056b3', '--bg-color': '#f4f7f9', '--card-bg': '#ffffff', '--text-color': '#333333', '--subtext-color': '#666666', '--border-color': '#e9ecef', '--light-bg': '#f8f9fa', '--btn-overlay': '0, 123, 255', '--shadow-color': 'rgba(0,0,0,0.1)' },
                // --- Guilds (Main: Left, Accent: Right) ---

                temur: { '--primary-color': '#0277bd', '--primary-hover': '#01579b', '--bg-color': '#e8f5e9', '--card-bg': '#f1f8e9', '--text-color': '#1b5e20', '--subtext-color': '#d32f2f', '--border-color': '#ef5350', '--light-bg': '#e1f5fe', '--btn-overlay': '2, 119, 189', '--shadow-color': 'rgba(2, 119, 189, 0.2)' }
            };
            
            const guildSymbolMap = {
                classic: [],
                azorius: ['W', 'U'], orzhov: ['W', 'B'], boros: ['R', 'W'], selesnya: ['G', 'W'],
                dimir: ['U', 'B'], izzet: ['U', 'R'], rakdos: ['B', 'R'], golgari: ['B', 'G'],
                gruul: ['R', 'G'], simic: ['G', 'U'],
                bant: ['G', 'W', 'U'], esper: ['W', 'U', 'B'], grixis: ['U', 'B', 'R'],
                jund: ['B', 'R', 'G'], naya: ['R', 'G', 'W'],
                abzan: ['W', 'B', 'G'], jeskai: ['U', 'R', 'W'], sultai: ['B', 'G', 'U'],
                mardu: ['R', 'W', 'B'], temur: ['G', 'U', 'R']
            };

            const updateTheme = (val) => {
                const theme = guildThemes[val];
                if (theme) {
                    for (const [key, value] of Object.entries(theme)) {
                        document.documentElement.style.setProperty(key, value);
                    }
                }
                const symbols = guildSymbolMap[val];
                const iconContainer = document.getElementById('guild-icons');
                
                // アイコンの生成と隠しコマンドの仕込み
                if (symbols && symbols.length > 0) {
                    iconContainer.innerHTML = '';
                    symbols.forEach(sym => {
                        const img = document.createElement('img');
                        img.src = `https://svgs.scryfall.io/card-symbols/${sym}.svg`;
                        
                        // ★ 隠しコマンド: グリクシス(U, B, R) の 黒(B) をクリック
                        if (val === 'grixis' && sym === 'B') {
                            img.style.cursor = 'pointer';
                            img.title = "???";
                            img.addEventListener('click', () => {
                                const modeSelect = document.getElementById('mode-select');
                                let ultOption = Array.from(modeSelect.options).find(opt => opt.value === 'ultimate');
                                
                                if (!ultOption) {
                                    ultOption = document.createElement('option');
                                    ultOption.value = 'ultimate';
                                    ultOption.style.color = 'red';
                                    ultOption.style.fontWeight = 'bold';
                                    ultOption.textContent = 'アルティメット (全パーマネント)';
                                    modeSelect.appendChild(ultOption);
                                    alert("隠しモード【アルティメット】が解放されました！");
                                }
                                
                                modeSelect.value = 'ultimate';
                                modeSelect.dispatchEvent(new Event('change'));
                            });
                        }
                        
                        iconContainer.appendChild(img);
                    });
                } else {
                    iconContainer.innerHTML = '';
                }
            };
            document.getElementById('theme-select').addEventListener('change', (e) => updateTheme(e.target.value));

            // --- UI Elements ---
            const genBtn=document.getElementById('generate-button');
            const manaInput=document.getElementById('mana-cost');
            const modeSelect=document.getElementById('mode-select');
            const langSelect=document.getElementById('lang-select');
            const colorLogic=document.getElementById('color-logic-select');
            const colorChecks=document.querySelectorAll('input[name="color"]');
            const rarityChecks=document.querySelectorAll('input[name="rarity"]');
            
            const cardImg=document.getElementById('card-image');
            const msgDiv=document.getElementById('message');
            const loader=document.getElementById('loading-spinner');
            
            const histList=document.getElementById('history-list');
            const histInfo=document.getElementById('history-mode-info');
            
            const prevOver=document.getElementById('preview-overlay');
            const prevImg=document.getElementById('preview-image');
            
            const pickContainer=document.getElementById('pick-container');
            const pickOver=document.getElementById('pick-overlay');
            const pickContent=document.getElementById('pick-content');

            // --- State ---
            let allSets=[], selectedSets=new Set(), tempSets=new Set(), historyCards=[];
            
            // --- Mode Logic ---
            modeSelect.addEventListener('change',(e)=>{
                const m=e.target.value;
                if(m==='cube'){ 
                    histInfo.textContent='※キューブ: 重複なし'; histInfo.style.color='#dc3545'; 
                    genBtn.textContent='クリーチャー生成';
                    document.getElementById('battlefield-title').textContent = '戦場 (クリーチャー)';
                }
                else if(m==='3pick'){ 
                    histInfo.textContent='※3pick'; histInfo.style.color='var(--subtext-color)'; 
                    genBtn.textContent='クリーチャー生成';
                    document.getElementById('battlefield-title').textContent = '戦場 (クリーチャー)';
                }
                else if(m==='ultimate'){ 
                    histInfo.textContent='※アルティメット: 全パーマネント出現！'; histInfo.style.color='#e63636'; 
                    genBtn.textContent='パーマネント生成'; 
                    document.getElementById('battlefield-title').textContent = '戦場 (パーマネント)';
                }
                else { 
                    histInfo.textContent='※ノーマル'; histInfo.style.color='var(--subtext-color)'; 
                    genBtn.textContent='クリーチャー生成'; 
                    document.getElementById('battlefield-title').textContent = '戦場 (クリーチャー)';
                }
                
                historyCards=[]; histList.innerHTML='<p style="color:red;font-size:0.9rem">モード変更リセット</p>';
                cardImg.style.display='none';
                pickContainer.style.display='none';
                msgDiv.style.display='block';
                msgDiv.textContent='マナ・コストとモードを選んで起動！';
            });

            // --- Expansion Loading ---
            const fetchSets=async()=>{
                try{
                    const r=await fetch('https://api.scryfall.com/sets'); const d=await r.json();
                    allSets=d.data.filter(s=>['core','expansion','masters','draft_innovation'].includes(s.set_type)&&!s.digital);
                    const list=document.getElementById('expansion-list'); list.innerHTML='';
                    allSets.forEach(s=>{
                        const div=document.createElement('div'); div.className='expansion-symbol'; div.dataset.code=s.code; div.title=s.name;
                        div.innerHTML=`<img src="${s.icon_svg_uri}">`;
                        div.onclick=()=>{ div.classList.toggle('selected'); if(tempSets.has(s.code)) tempSets.delete(s.code); else tempSets.add(s.code); };
                        list.appendChild(div);
                    });
                    tempSets=new Set(allSets.map(s=>s.code)); selectedSets=new Set(tempSets);
                    document.querySelectorAll('.expansion-symbol').forEach(e=>e.classList.add('selected'));
                    document.getElementById('open-settings-btn').disabled=false; 
                    document.getElementById('open-settings-btn').textContent='エキスパンション設定';
                    genBtn.disabled=false;
                }catch(e){console.error(e);}
            };
            fetchSets();

            // --- Modal Logic ---
            const dlg=document.getElementById('expansion-dialog');
            document.getElementById('open-settings-btn').onclick=()=>{
                tempSets=new Set(selectedSets);
                document.querySelectorAll('.expansion-symbol').forEach(e=>{
                    if(tempSets.has(e.dataset.code)) e.classList.add('selected'); else e.classList.remove('selected');
                });
                dlg.showModal();
            }
            document.querySelector('.close-btn').onclick=()=>dlg.close();
            document.getElementById('apply-settings-btn').onclick=()=>{
                selectedSets=new Set(tempSets); 
                document.getElementById('current-scope').textContent=selectedSets.size===allSets.length?'現在: 全セット（レガシー）':`現在: ${selectedSets.size}セット`;
                dlg.close();
            }
            document.getElementById('clear-sets-btn').onclick=()=>{ tempSets.clear(); document.querySelectorAll('.expansion-symbol').forEach(e=>e.classList.remove('selected')); }
            
            const isSet=(s,d,types,codes=[])=>{
                if(codes.includes(s.code))return true;
                if(!types.includes(s.set_type))return false;
                return new Date(s.released_at)>=new Date(d);
            }
            document.querySelectorAll('.format-buttons button').forEach(b=>{
                b.onclick=()=>{
                    tempSets.clear(); const f=b.dataset.format;
                    allSets.forEach(s=>{
                        let ok=false;
                        if(f==='legacy') ok=true;
                        else if(f==='modern') ok=isSet(s,'2003-07-28',['core','expansion'],['mh1','mh2','mh3','ltr']);
                        else if(f==='pioneer') ok=isSet(s,'2012-10-05',['core','expansion']);
                        else if(f==='standard') ok=isSet(s,'2021-09-01',['core','expansion']);
                        if(ok) tempSets.add(s.code);
                    });
                    document.querySelectorAll('.expansion-symbol').forEach(e=>{
                        if(tempSets.has(e.dataset.code)) e.classList.add('selected'); else e.classList.remove('selected');
                    });
                }
            });

            // --- Generation Logic ---
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            const getImg=(d)=>d.image_uris?d.image_uris.normal:(d.card_faces?d.card_faces[0].image_uris.normal:null);
            
            const buildQuery=(cmc, mode)=>{
                let q = [];
                // Ultimate mode logic
                if (mode === 'ultimate') {
                    q.push('(t:creature or t:artifact or t:enchantment or t:planeswalker or t:battle)');
                    q.push('-t:saga');
                    q.push('-t:land');
                } else {
                    q.push('t:creature');
                    q.push('-t:battle');
                    q.push('-t:saga');
                }
                
                q.push(`cmc=${cmc}`);
                q.push('-is:digital');

                // Exclude unplayable/special cards
                q.push('-t:contraption');
                q.push('-t:attraction');
                q.push('-t:conspiracy');
                q.push('-t:plane');
                q.push('-t:scheme');
                q.push('-t:vanguard');
                q.push('-is:token');
                
                const cols=Array.from(colorChecks).filter(c=>c.checked).map(c=>c.value);
                const colors=cols.filter(c=>c!=='c'); const hasC=cols.includes('c');
                if(cols.length>0){
                    if(colorLogic.value==='or') q.push(`(${cols.map(c=>`c:${c}`).join(' or ')})`);
                    else {
                        if(colors.length>0) q.push(`(${`c<=${colors.join('')}`}${!hasC?' -c:c':''})`);
                        else if(hasC) q.push('c:c');
                    }
                }
                const rars=Array.from(rarityChecks).filter(c=>c.checked).map(c=>c.value);
                if(rars.length>0) { q.push(`(${rars.map(r=>`r:${r}`).join(' or ')})`); q.push('is:firstprint'); }
                if(selectedSets.size<allSets.length) q.push(`(${Array.from(selectedSets).map(c=>`e:${c}`).join(' or ')})`);
                return q;
            };

            const fetchCard=async(queryParts, exclude=[])=>{
                let attempts=0; const q=encodeURIComponent(queryParts.join(' '));
                while(attempts<20){
                    try{
                        const r=await fetch(`https://api.scryfall.com/cards/random?q=${q}`);
                        if(!r.ok){ if(attempts===0)throw new Error(); }
                        else{
                            let d=await r.json();
                            if(!exclude.includes(d.name)){
                                if(langSelect.value==='ja' && d.lang!=='ja'){
                                    try{
                                        const r2=await fetch(`https://api.scryfall.com/cards/search?q=oracle_id:${d.oracle_id}+lang:ja&unique=prints&order=released&dir=asc`);
                                        if(r2.ok){ const j=await r2.json(); if(j.data.length>0 && getImg(j.data[0])) d=j.data[0]; }
                                    }catch(e){}
                                }
                                return d;
                            }
                        }
                    }catch(e){if(attempts===0)throw e;}
                    attempts++; await new Promise(r=>setTimeout(r,50));
                }
                throw new Error('Retries exceeded');
            };

            const runGen=async(isBattle=false)=>{
                const cmc = isBattle ? document.getElementById('game-momir-x').value : manaInput.value;
                if(cmc===''||parseInt(cmc)<0) { alert('マナコスト不正'); return; }
                if(selectedSets.size===0) { alert('セット未選択'); return; }

                const btn = isBattle ? document.getElementById('game-momir-btn') : genBtn;
                const msg = isBattle ? document.getElementById('game-message') : msgDiv;
                
                btn.disabled=true; 
                if(!isBattle) { loader.style.display='block'; cardImg.style.display='none'; pickContainer.style.display='none'; msg.style.display='none'; }
                else msg.textContent='召喚中...';

                try {
                    const mode = modeSelect.value;
                    const q = buildQuery(cmc, mode);

                    if(mode==='3pick'){
                        let picks=[], names=[];
                        for(let i=0; i<3; i++){
                            try{ 
                                const c=await fetchCard(q, names); 
                                picks.push(c); names.push(c.name); 
                            } catch(e){ if(picks.length===0) throw e; break; }
                        }
                        
                        if(isBattle) {
                            pickContent.innerHTML='';
                            picks.forEach(c=>{
                                const img=document.createElement('img'); img.src=getImg(c); img.className='pick-image';
                                img.onclick=()=>{
                                    pickOver.style.display='none';
                                    spawnBattleToken(c); msg.textContent='';
                                };
                                pickContent.appendChild(img);
                            });
                            pickOver.style.display='flex';
                        } else {
                            pickContainer.innerHTML='';
                            picks.forEach(c=>{
                                const img=document.createElement('img'); img.src=getImg(c); img.className='pick-image';
                                img.onclick=()=>{
                                    pickContainer.style.display='none';
                                    showSimpleResult(c); addHistory(c);
                                };
                                pickContainer.appendChild(img);
                            });
                            loader.style.display='none';
                            msg.textContent='1枚選択してください';
                            msg.style.display='block';
                            pickContainer.style.display='flex';
                        }

                    } else {
                        const exclude = (mode==='cube') ? historyCards.map(c=>c.name) : [];
                        const c = await fetchCard(q, exclude);
                        if(isBattle) { spawnBattleToken(c); msg.textContent=''; }
                        else { showSimpleResult(c); addHistory(c); }
                    }

                } catch(e) {
                    const err='見つかりません';
                    if(isBattle) msg.textContent=err; else showMessage(err);
                } finally {
                    btn.disabled=false; 
                    if(!isBattle && modeSelect.value!=='3pick') loader.style.display='none';
                }
            };

            genBtn.onclick=()=>runGen(false);
            manaInput.onkeydown=(e)=>{if(e.key==='Enter')runGen(false)};

            const showSimpleResult=(c)=>{ 
                cardImg.src=getImg(c);
                cardImg.classList.remove('spin-animate');
                void cardImg.offsetWidth; cardImg.classList.add('spin-animate');
                cardImg.onload=()=>cardImg.style.display='block'; 
                msgDiv.style.display='none'; 
            }
            const showMessage=(t)=>{ msgDiv.textContent=t; msgDiv.style.display='block'; }
            const addHistory=(c)=>{
                historyCards.unshift({name:c.name, image:getImg(c), cmc:c.cmc, setCode:c.set.toUpperCase()});
                const item=document.createElement('div'); item.className='history-item';
                item.style.backgroundImage=`url('${getImg(c)}')`;
                item.onclick=()=>{
                    cardImg.src=getImg(c);
                    cardImg.classList.remove('spin-animate'); void cardImg.offsetWidth; cardImg.classList.add('spin-animate');
                    cardImg.style.display='block'; pickContainer.style.display='none'; msgDiv.style.display='none';
                };
                histList.prepend(item);
            };
            prevOver.onclick=()=>prevOver.style.display='none';


            /* --- Battle Simulator Logic --- */
            let gameDeck=[], gameHand=[], gameCreatures=[], gameLands=[], gameGrave=[], gameLife=20, isSelectingCost=false;
            const updateStats=()=>{
                document.getElementById('game-life').textContent=gameLife;
                document.getElementById('game-library-count').textContent=gameDeck.length;
                document.getElementById('game-grave-count').textContent=gameGrave.length;
            };
            
            const render=()=>{
                const h=document.getElementById('zone-hand'); h.innerHTML='<span class="zone-label">手札 (クリックで土地プレイ / モミールコスト選択)</span>';
                gameHand.forEach((c,i)=>{
                    const d=mkCard(c); d.onclick=()=>handClick(i);
                    if(isSelectingCost)d.classList.add('selected'); h.appendChild(d);
                });
                
                const cr=document.getElementById('zone-battlefield-creatures'); 
                const lbl = modeSelect.value === 'ultimate' ? '戦場 (パーマネント)' : '戦場 (クリーチャー)';
                cr.innerHTML=`<span class="zone-label">${lbl}</span>`;
                gameCreatures.forEach(c=>{ 
                    const d=mkCard(c); 
                    d.onclick=()=>{c.tapped=!c.tapped; render();}; 
                    cr.appendChild(d); 
                });
                
                const lr=document.getElementById('zone-battlefield-lands'); lr.innerHTML='<span class="zone-label">戦場 (土地)</span>';
                gameLands.forEach(c=>{ 
                    const d=mkCard(c); 
                    d.onclick=()=>{c.tapped=!c.tapped; render();}; 
                    lr.appendChild(d); 
                });
            };
            
            const mkCard=(c)=>{
                const d=document.createElement('div'); d.className='game-card'+(c.tapped?' tapped':'');
                
                if (c.type === 'land') {
                    d.classList.add('land-card');
                    d.innerHTML = `<img src="https://svgs.scryfall.io/card-symbols/${c.mana}.svg" class="mana-icon">`;
                } else {
                    d.style.backgroundImage=`url('${c.img}')`;
                    d.onmouseenter=()=>{prevImg.src=c.img; prevOver.style.display='block';};
                    d.onmouseleave=()=>{prevOver.style.display='none';};
                }
                return d;
            };
            
            window.modifyLife=(n)=>{gameLife+=n; updateStats();};
            window.gameNewGame=()=>{if(confirm('リセットしますか？'))initGame();};
            window.gameUntap=()=>{ gameCreatures.forEach(c=>c.tapped=false); gameLands.forEach(c=>c.tapped=false); render(); };
            window.gameDraw=()=>{ if(gameDeck.length){ gameHand.push(gameDeck.pop()); updateStats(); render(); } };

            const handClick=(i)=>{
                if(isSelectingCost){
                    gameGrave.push(gameHand.splice(i,1)[0]);
                    isSelectingCost=false; 
                    document.getElementById('game-message').textContent='';
                    resolveMomir(); 
                } else {
                    if(gameHand[i].type==='land'){ gameLands.push(gameHand.splice(i,1)[0]); render(); }
                }
            };

            const initGame=()=>{
                gameDeck=[]; 
                const LANDS = [{m:'W'}, {m:'U'}, {m:'B'}, {m:'R'}, {m:'G'}];
                LANDS.forEach(l=>{ for(let k=0;k<12;k++) gameDeck.push({type:'land', mana:l.m, tapped:false}); });
                for(let i=gameDeck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[gameDeck[i],gameDeck[j]]=[gameDeck[j],gameDeck[i]];}
                gameHand=[]; gameCreatures=[]; gameLands=[]; gameGrave=[]; gameLife=20;
                for(let i=0;i<7;i++) gameHand.push(gameDeck.pop());
                updateStats(); render();
            };

            document.getElementById('game-momir-btn').onclick=()=>{
                if(gameHand.length===0){ alert('手札がありません'); return; }
                
                isSelectingCost=true;
                document.getElementById('game-message').textContent='コストにする手札を選んでください';
                render(); 
            };

            const resolveMomir=()=>{
                render();
                runGen(true); 
            };

            const spawnBattleToken=(c)=>{
                gameCreatures.push({type:'creature', name:c.name, img:getImg(c), tapped:false});
                if(modeSelect.value==='cube') historyCards.unshift({name:c.name});
                render();
            };

            initGame();
        });
    </script>
</body>
</html>
